# Mosquitto MQTT Broker Configuration
# Tender Cells — Local development setup
# Last updated: 2026-06-11

# Network and protocol
listener 1883
protocol mqtt

# Default authentication (dev only — enable in production)
allow_anonymous true

# Persistence
persistence true
persistence_location ./mosquitto-data/

# Logging
log_dest file ./mosquitto.log
log_dest stdout
log_type all
log_timestamp true

# WebSocket support (optional, for browser clients)
listener 9001
protocol websockets

# Max message size (device firmware publishes ~512 bytes)
max_message_size 8192

# QoS settings
max_queued_messages 100
message_size_limit 0

# Retention
retain_available true

# Connection limits
max_connections -1

# Topic-specific rules (optional ACL)
# acl_file ./mosquitto-acl.conf
