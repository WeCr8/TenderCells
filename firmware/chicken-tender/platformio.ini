[env:esp32-wroom-32]
; Pinned to Arduino-ESP32 core 2.0.x (espressif32 6.9.0) so the watchdog
; (esp_task_wdt_init(sec,bool)) and servo PWM APIs used in main.cpp match.
platform = espressif32 @ 6.9.0
board = esp32doit-devkit-v1
framework = arduino

; Chicken Tender main controller
; ESP32-WROOM-32, 4MB flash, 520KB RAM
; Controls: sensors, MQTT, arm coordination, door servo, feed dispenser, cleaning cycle

upload_speed = 460800
monitor_speed = 115200

; Board definitions
board_build.f_cpu = 240000000L
board_build.f_flash = 40000000L
board_build.flash_mode = dio
board_build.flash_size = 4MB

; Libraries — motion/sensor control is MQTT-only; no Firebase on the device.
lib_deps =
  knolleary/PubSubClient@^2.8
  bblanchon/ArduinoJson@^7.0.0
  adafruit/DHT sensor library@^1.4.4
  adafruit/Adafruit Unified Sensor@^1.1.14
  tzapu/WiFiManager@^2.0.17
  madhephaestus/ESP32Servo@^1.2.1

; Build flags
build_flags =
  -DCORE_DEBUG_LEVEL=5
  -DESP32
  -DBOARD_CHICKEN_TENDER

; Monitor
monitor_filters = esp32_exception_decoder

; OTA upload (optional)
; upload_protocol = espota
; upload_port = 192.168.4.1
