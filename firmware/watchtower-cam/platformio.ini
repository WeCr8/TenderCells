[env:xiao-esp32s3-sense]
; Tender Cells — Camera Node (WatchTower / ChickenEye eye)
; Seeed XIAO ESP32-S3 Sense (OV2640). Serves MJPEG at /stream and publishes its
; LAN streamUrl in the MQTT heartbeat so the OS auto-renders the live feed where placed.
; Pinned to the same core as the rest of the firmware tree.
platform = espressif32 @ 6.9.0
board = seeed_xiao_esp32s3
framework = arduino

monitor_speed = 115200
upload_speed = 921600

; Camera needs PSRAM for frame buffers; XIAO S3 has OPI PSRAM.
build_flags =
  -DBOARD_HAS_PSRAM
  -DARDUINO_USB_MODE=1
  -DARDUINO_USB_CDC_ON_BOOT=1
  -DCORE_DEBUG_LEVEL=3
  -DBOARD_WATCHTOWER_CAM

monitor_filters = esp32_exception_decoder

lib_deps =
  knolleary/PubSubClient@^2.8
  bblanchon/ArduinoJson@^7.0.0
  tzapu/WiFiManager@^2.0.17
