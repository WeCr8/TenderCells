name: Deploy (Firebase Hosting)

# Builds the marketing site + the app (and the AI snapshot) and publishes to
# Firebase Hosting on every push to main.
#
# Required repo secret:
#   FIREBASE_TOKEN  — from `firebase login:ci` (a CI deploy token).
# Optional repo variable:
#   FIREBASE_PROJECT — project id; falls back to the default in .firebaserc.
#
# Hosting target "main" (firebase.json) serves website/dist; the app is built by
# build:with-app and copied into dist/app. The snapshot.json is generated as part
# of build:public-demo.

on:
  push:
    branches: [main]
  workflow_dispatch: {}

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: applications/tendercells_ui/test_output
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install app deps
        run: npm ci --prefix tendercells-ui || npm install --prefix tendercells-ui

      - name: Install website deps
        run: npm ci --prefix website || npm install --prefix website

      - name: Build site + app + snapshot
        run: npm --prefix website run build:with-app

      - name: Deploy to Firebase Hosting
        working-directory: .
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
          FIREBASE_PROJECT: ${{ vars.FIREBASE_PROJECT }}
        run: |
          npm i -g firebase-tools
          firebase deploy --only hosting:main --non-interactive \
            --token "$FIREBASE_TOKEN" \
            ${FIREBASE_PROJECT:+--project "$FIREBASE_PROJECT"}
