<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 250" role="img" aria-label="Simulate: robot arm in a 3D simulation viewport">
  <defs>
    <linearGradient id="sg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0a2030"/>
      <stop offset="1" stop-color="#07161f"/>
    </linearGradient>
    <linearGradient id="floor" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#123a2a"/>
      <stop offset="1" stop-color="#0c2a1d"/>
    </linearGradient>
  </defs>
  <rect width="400" height="250" fill="url(#sg)"/>
  <!-- perspective sim floor -->
  <polygon points="60,250 340,250 300,150 100,150" fill="url(#floor)"/>
  <g stroke="#2a7b4f" stroke-width="1" opacity="0.7">
    <path d="M100 150 60 250M140 150 113 250M180 150 167 250M220 150 220 250M260 150 273 250M300 150 327 250"/>
    <path d="M97 168H303M90 195H310M82 224H318"/>
  </g>
  <!-- 6DOF arm wireframe -->
  <g stroke="#7fd7a3" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <rect x="192" y="150" width="36" height="14" rx="3" fill="#0e3a28"/>
    <path d="M210 150V112"/>
    <path d="M210 112l34-26"/>
    <path d="M244 86l4 34"/>
    <circle cx="210" cy="112" r="6" fill="#0e3a28"/>
    <circle cx="244" cy="86" r="6" fill="#0e3a28"/>
    <circle cx="248" cy="120" r="5" fill="#0e3a28"/>
  </g>
  <!-- gripper target -->
  <circle cx="248" cy="120" r="14" stroke="#C8B882" stroke-width="2" fill="none" stroke-dasharray="4 4"/>
  <!-- HUD -->
  <g fill="#7fd7a3" font-family="monospace" font-size="11">
    <rect x="20" y="20" width="120" height="48" rx="4" fill="#0e2a3a" stroke="#1d5066"/>
    <text x="30" y="40">SIM • 60fps</text>
    <text x="30" y="58">J1-J6  XYZ ok</text>
  </g>
  <circle cx="30" cy="36" r="4" fill="#3ad17a"/>
</svg>
