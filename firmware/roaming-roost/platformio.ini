[env:roaming-roost-esp32]
platform = espressif32
board = esp32doit-devkit-v1
framework = arduino

; Roaming Roost — ESP32-WROOM-32
; Hardware: 4× mecanum wheel DC motors, L298N dual H-bridge ×2,
;           GPS (NEO-6M), ultrasonic sensors ×4 (boundary/obstacle),
;           12V LiFePO4 battery, dock reed switch
; Function: patrol yard, return-to-dock on schedule or low battery,
;           boundary enforcement, MQTT-driven waypoint nav

upload_speed = 460800
monitor_speed = 115200

board_build.f_cpu = 240000000L
board_build.f_flash = 40000000L
board_build.flash_mode = dio
board_build.flash_size = 4MB

lib_deps =
  knolleary/PubSubClient@^2.8
  bblanchon/ArduinoJson@^7.0.0
  mikalhart/TinyGPSPlus@^1.0.3
  ; NewPing for HC-SR04 ultrasonic
  teckel12/NewPing@^1.9.7

build_flags =
  -DESP32
  -DBOARD_ROAMING_ROOST
  -DCORE_DEBUG_LEVEL=3

monitor_filters = esp32_exception_decoder
