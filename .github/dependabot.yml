# Dependabot keeps dependencies patched without a human watching the clock.
# Scoped to the actively-developed packages. Updates are grouped so newcomers
# see a few tidy PRs per week, not a flood. See:
# https://docs.github.com/code-security/dependabot/dependabot-version-updates
version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    labels:
      - dependencies
    groups:
      actions:
        patterns:
          - "*"

  - package-ecosystem: npm
    directory: /applications/tendercells_ui/test_output/tendercells-ui
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    labels:
      - dependencies
    groups:
      dashboard-minor-patch:
        update-types:
          - minor
          - patch

  - package-ecosystem: npm
    directory: /applications/tendercells_ui/test_output/website
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    labels:
      - dependencies
    groups:
      website-minor-patch:
        update-types:
          - minor
          - patch

  - package-ecosystem: npm
    directory: /applications/tendercells_ui/test_output/express-api
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    labels:
      - dependencies
    groups:
      api-minor-patch:
        update-types:
          - minor
          - patch

  - package-ecosystem: npm
    directory: /functions
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    labels:
      - dependencies
    groups:
      functions-minor-patch:
        update-types:
          - minor
          - patch
