# Tender Cells — Mosquitto MQTT broker on a Raspberry Pi (local control hub).
# Install:
#   sudo apt install -y mosquitto mosquitto-clients
#   sudo cp mosquitto.conf /etc/mosquitto/conf.d/tendercells.conf
#   sudo systemctl enable --now mosquitto
#
# LAN/classroom default: anonymous allowed so boards + the app connect with no
# credentials (motion stays local, never cloud — same as the embedded broker).
# For a locked-down deployment, set `allow_anonymous false` and add a password_file.

listener 1883 0.0.0.0
allow_anonymous true

# Persist retained messages (E-STOP uses retain) across restarts.
persistence true
persistence_location /var/lib/mosquitto/

max_keepalive 120
# Uncomment to require auth instead of anonymous:
# allow_anonymous false
# password_file /etc/mosquitto/passwd
