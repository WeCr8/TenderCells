name: CI

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  tendercells-ui:
    name: "UI — build, type-check, tests"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: applications/tendercells_ui/test_output/tendercells-ui
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: applications/tendercells_ui/test_output/tendercells-ui/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Quality loop (build + tests)
        run: npm run quality:loop

  functions:
    name: "Cloud Functions — build"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: functions
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: npm
          cache-dependency-path: functions/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npx tsc --noEmit --quiet

      - name: Build
        run: npm run build

  firmware:
    name: "Firmware — PlatformIO build"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Cache PlatformIO
        uses: actions/cache@v4
        with:
          path: ~/.platformio
          key: pio-${{ hashFiles('firmware/**/platformio.ini') }}

      - name: Install PlatformIO
        run: pip install platformio

      - name: Build Chicken Tender firmware
        run: cd firmware/chicken-tender && pio run

      - name: Build WatchTower firmware
        run: cd firmware/watchtower && pio run
        continue-on-error: true

      - name: Check binary size
        run: |
          SIZE=$(stat -c%s firmware/chicken-tender/.pio/build/esp32-wroom-32/firmware.bin 2>/dev/null || echo "0")
          echo "Firmware size: $SIZE bytes"
          if [ "$SIZE" -gt 3932160 ]; then
            echo "Warning: Firmware exceeds 3.75MB flash limit"
          fi

  security:
    name: "Security — secret scan"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Scan for Google API keys
        run: |
          if grep -rn 'AIza[0-9A-Za-z_-]\{35\}' . \
              --exclude-dir=node_modules --exclude-dir=.git --exclude='*.env' 2>/dev/null; then
            echo "ERROR: Hardcoded Google API key found"
            exit 1
          fi

      - name: Scan for Anthropic keys
        run: |
          if grep -rn 'ANTHROPIC_API_KEY\s*=\s*"sk-ant' . \
              --exclude-dir=node_modules --exclude='*.env' 2>/dev/null; then
            echo "ERROR: Hardcoded Anthropic API key found"
            exit 1
          fi

      - name: Scan for hardcoded WiFi passwords in firmware
        run: |
          if grep -rn 'password\s*=\s*"[a-zA-Z0-9_!@#]\{6,\}"' firmware/ --include='*.cpp' 2>/dev/null; then
            echo "ERROR: Hardcoded WiFi password in firmware"
            exit 1
          fi

  deploy:
    name: "Deploy — Firebase Hosting"
    needs: [tendercells-ui, functions, firmware, security]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build website
        working-directory: applications/tendercells_ui/test_output/website
        run: |
          npm ci
          npm run build

      - name: Build control app
        working-directory: applications/tendercells_ui/test_output/tendercells-ui
        run: |
          npm ci
          npm run build

      - name: Deploy to Firebase
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_TENDER_CELLS }}
          channelId: live
          projectId: tender-cells
