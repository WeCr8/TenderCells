<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 250" role="img" aria-label="Build: soldering a circuit board">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#143524"/>
      <stop offset="1" stop-color="#0D2B1E"/>
    </linearGradient>
  </defs>
  <rect width="400" height="250" fill="url(#bg)"/>
  <!-- PCB -->
  <rect x="70" y="150" width="220" height="70" rx="6" fill="#0e3a28" stroke="#2a7b4f" stroke-width="2"/>
  <g stroke="#3a6e4f" stroke-width="2" fill="none">
    <path d="M90 170h60v30M120 200h80M180 165v40h60"/>
  </g>
  <g fill="#C8B882">
    <rect x="150" y="178" width="22" height="22" rx="2"/>
    <circle cx="100" cy="170" r="4"/><circle cx="240" cy="205" r="4"/><circle cx="210" cy="170" r="4"/>
  </g>
  <!-- solder joint glow -->
  <circle cx="240" cy="160" r="10" fill="#E8A020" opacity="0.5"/>
  <circle cx="240" cy="160" r="4" fill="#FFD66B"/>
  <!-- soldering iron -->
  <g transform="rotate(35 250 110)">
    <rect x="244" y="40" width="16" height="70" rx="4" fill="#8A7D55"/>
    <rect x="240" y="36" width="24" height="14" rx="3" fill="#CC3333"/>
    <rect x="248" y="108" width="8" height="44" fill="#b0b0b0"/>
    <path d="M248 152l4 12 4-12z" fill="#E8A020"/>
  </g>
  <!-- solder wire -->
  <path d="M150 40c30 20 10 50 40 70" stroke="#cfcfcf" stroke-width="3" fill="none"/>
  <!-- smoke -->
  <path d="M240 150c-6-12 6-18 0-30s8-18 2-28" stroke="#ffffff" stroke-width="2" fill="none" opacity="0.25" stroke-linecap="round"/>
</svg>
