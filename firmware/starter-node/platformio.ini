[env:xiao-esp32s3]
; Tender Cells Starter Node — minimal firmware that runs on a cheap Seeed XIAO
; ESP32-S3 dev board. Proves the full pipeline (WiFi provisioning → MQTT
; heartbeat → E-STOP) without any coop hardware, so kids can flash a $7 board
; and immediately see it appear in `tc status`.
;
; Pinned to Arduino-ESP32 core 2.0.x (espressif32 6.9.0) to match the rest of
; the firmware tree (same watchdog + WiFiManager + PubSubClient APIs).
platform = espressif32 @ 6.9.0
board = seeed_xiao_esp32s3
framework = arduino

monitor_speed = 115200
upload_speed = 921600

; XIAO ESP32-S3 talks Serial over native USB-CDC — enable it so the banner
; and logs actually appear in the Serial Monitor.
build_flags =
  -DARDUINO_USB_MODE=1
  -DARDUINO_USB_CDC_ON_BOOT=1
  -DCORE_DEBUG_LEVEL=3
  -DBOARD_STARTER_NODE

monitor_filters = esp32_exception_decoder

lib_deps =
  knolleary/PubSubClient@^2.8
  bblanchon/ArduinoJson@^7.0.0
  tzapu/WiFiManager@^2.0.17
  ; ESP32Servo drives both the door servo (peripheral=door) and the two
  ; continuous-rotation drive servos (peripheral=drive) for the basic
  ; classroom Roaming Roost. Same lib the Chicken Tender uses for its door.
  madhephaestus/ESP32Servo@^1.2.1
  ; Real sensor drivers: DHT22 (peripheral=temp-humidity). LDR uses bare analogRead.
  adafruit/DHT sensor library@^1.4.4
  adafruit/Adafruit Unified Sensor@^1.1.14
