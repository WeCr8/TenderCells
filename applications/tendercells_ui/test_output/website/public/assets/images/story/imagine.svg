<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 250" role="img" aria-label="Imagine: sketching an idea">
  <rect width="400" height="250" fill="#0D2B1E"/>
  <rect width="400" height="250" fill="url(#ig)"/>
  <defs>
    <linearGradient id="ig" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#143524"/>
      <stop offset="1" stop-color="#0D2B1E"/>
    </linearGradient>
  </defs>
  <!-- sketch grid -->
