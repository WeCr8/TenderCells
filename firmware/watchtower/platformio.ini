[env:watchtower-esp32s3]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino

; WatchTower AI — ESP32-S3-EYE
; Hardware: 3× ESP32-CAM at 120° spacing, LoRa SX1276 915MHz,
;           18650×3 battery, 5W solar panel, MPPT charger CN3791
; Function: on-device TFLite Micro predator inference, LoRa mesh alert broadcast

upload_speed = 460800
monitor_speed = 115200

board_build.mcu = esp32s3
board_build.f_cpu = 240000000L
board_build.flash_size = 8MB
board_build.flash_mode = qio
board_build.psram_type = opi
board_upload.use_1200bps_touch = false
board_upload.wait_for_upload_port = false

lib_deps =
  knolleary/PubSubClient@^2.8
  bblanchon/ArduinoJson@^7.0.0
  sandeepmistry/LoRa@^0.8.0

build_flags =
  -DESP32S3
  -DBOARD_WATCHTOWER
  -DCORE_DEBUG_LEVEL=3
  -DUSE_TFLITE_MICRO
  -DTF_LITE_STATIC_MEMORY
  -DCAMERA_MODEL_AI_THINKER

; PlatformIO runs convert_tflite.py before each build
extra_scripts = extra_scripts/convert_tflite.py

monitor_filters = esp32_exception_decoder
