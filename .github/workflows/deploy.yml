name: Deploy (Firebase Hosting)

# Builds the marketing site + the app (and the AI snapshot) and publishes to
# Firebase Hosting on every push to main.
#
# Required repo secret:
#   FIREBASE_SERVICE_ACCOUNT_TENDER_CELLS — the service-account JSON (already set).
# Project id is read from that JSON's project_id.
#
# Hosting target "main" (firebase.json) serves website/dist; the app is built by
# build:with-app and copied into dist/app. The snapshot.json is generated as part
# of build:public-demo.

on:
  push:
    branches: [main]
  workflow_dispatch: {}

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: applications/tendercells_ui/test_output
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Install app deps
        run: npm ci --prefix tendercells-ui || npm install --prefix tendercells-ui

      - name: Install website deps
        run: npm ci --prefix website || npm install --prefix website

      - name: Build site + app + snapshot
        run: npm --prefix website run build:with-app

      - name: Deploy to Firebase Hosting
        working-directory: .
        env:
          FIREBASE_SA: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_TENDER_CELLS }}
        run: |
          printf '%s' "$FIREBASE_SA" > "$HOME/sa.json"
          export GOOGLE_APPLICATION_CREDENTIALS="$HOME/sa.json"
          PROJECT=$(node -e "console.log(require(process.env.HOME + '/sa.json').project_id)")
          echo "Deploying to project: $PROJECT"
          npm i -g firebase-tools
          firebase deploy --only hosting:main --non-interactive --project "$PROJECT"
          rm -f "$HOME/sa.json"
